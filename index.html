        if (blob) {
            try {
                const bitmap = await createImageBitmap(blob);
                canvas.width = bitmap.width;
                canvas.height = bitmap.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(bitmap, 0, 0);
                bitmap.close();
            } catch (e) {
                console.warn('缩略图绘制失败', e);
            }
        }
    }

    /**
     * 格式化文件大小为易读格式
     * @param {number} bytes - 文件大小（字节）
     * @returns {string} 格式化后的文件大小字符串
     *
     * 支持B、KB、MB、GB四种单位，自动选择合适的单位
     */
    function formatFileSize(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    /**
     * 更新图片信息显示
     * @param {string} imageId - 图片 ID
     *
     * 更新图片名称、尺寸、大小和状态信息的显示
     * 优化：文件名仅在初次渲染时设置，此处仅更新可变部分（尺寸、状态等）
     */
    function updateImageInfo(imageId) {
        const imageData = images.find(img => img.id === imageId);
        if (!imageData) return;
    
        const infoDiv = document.getElementById(`info-${imageId}`);
        if (infoDiv) {
            // 获取或创建文件名元素（仅在需要时创建）
            let fileNameDiv = infoDiv.querySelector('.text-multiline');
            if (!fileNameDiv) {
                fileNameDiv = document.createElement('div');
                fileNameDiv.className = 'text-multiline';
                fileNameDiv.style.fontWeight = 'bold';
                infoDiv.insertBefore(fileNameDiv, infoDiv.firstChild);
            }
                
            // 更新尺寸信息
            const sizeRow = infoDiv.querySelector('.image-info-row');
            let targetElementForFileSize; // 用于确定文件大小元素的插入位置
            
            // 检查尺寸数据是否有效
            const hasValidSize = imageData.hasOwnProperty('width') && 
                                imageData.hasOwnProperty('height') && 
                                typeof imageData.width === 'number' && 
                                typeof imageData.height === 'number' &&
                                imageData.width > 0 && 
                                imageData.height > 0;
            
            if (sizeRow) {
                sizeRow.innerHTML = `<span>${hasValidSize ? 
                    `${imageData.width}×${imageData.height}` : 
                    '<span style="color: #999; font-style: italic;">尺寸未知</span>'}</span>`;
                targetElementForFileSize = sizeRow;
            } else {
                const newRow = document.createElement('div');
                newRow.className = 'image-info-row';
                newRow.innerHTML = `<span>${hasValidSize ? 
                    `${imageData.width}×${imageData.height}` : 
                    '<span style="color: #999; font-style: italic;">尺寸未知</span>'}</span>`;
                infoDiv.insertBefore(newRow, fileNameDiv.nextSibling);
                targetElementForFileSize = newRow;
            }
                
            // 更新格式和大小信息
            const fileSizeDiv = infoDiv.querySelector('.file-size');
            if (fileSizeDiv) {
                fileSizeDiv.textContent = `格式：${imageData.format || 'N/A'} | ${formatFileSize(imageData.size)}`;
            } else {
                const newFileSizeDiv = document.createElement('div');
                newFileSizeDiv.className = 'file-size';
                newFileSizeDiv.textContent = `格式：${imageData.format || 'N/A'} | ${formatFileSize(imageData.size)}`;
                infoDiv.insertBefore(newFileSizeDiv, targetElementForFileSize.nextSibling);
            }
                
            // 更新状态徽章
            const statusBadge = infoDiv.querySelector('.status-badge');
            if (statusBadge) {
                statusBadge.className = `status-badge status-${imageData.status}`;
                statusBadge.textContent = imageData.status === 'original' ? '原始图片' :
                                         imageData.status === 'encrypted' ? '已混淆' : '已解混淆';
            } else {
                const newStatusBadge = document.createElement('div');
                newStatusBadge.className = `status-badge status-${imageData.status}`;
                newStatusBadge.textContent = imageData.status === 'original' ? '原始图片' :
                                            imageData.status === 'encrypted' ? '已混淆' : '已解混淆';
                infoDiv.appendChild(newStatusBadge);
            }
        }
    }

    /**
     * 切换图片选择状态
     * @param {string} imageId - 图片ID
     * @param {Event} event - 事件对象
     *
     * 切换单张图片的选择状态，更新UI显示
     */
    function toggleSelect(imageId, event) {
        event.stopPropagation();  // 阻止事件冒泡

        const item = document.querySelector(`[data-id="${imageId}"]`);
        const checkbox = item ? item.querySelector('.select-checkbox') : null;
        
        if (selectedImages.has(imageId)) {
            selectedImages.delete(imageId);
            if (item) item.classList.remove('selected');
            if (checkbox) checkbox.checked = false;  // 显式设置复选框状态
        } else {
            selectedImages.add(imageId);
            if (item) item.classList.add('selected');
            if (checkbox) checkbox.checked = true;   // 显式设置复选框状态
        }
    }

    /**
     * 全选图片
     *
     * 选择所有图片，更新选中状态和UI显示
     */
    function selectAll() {
        selectedImages.clear();
        images.forEach(img => {
            selectedImages.add(img.id);
            const item = document.querySelector(`[data-id="${img.id}"]`);
            if (item) {
                item.classList.add('selected');
                const checkbox = item.querySelector('.select-checkbox');
                if (checkbox) checkbox.checked = true;
            }
        });
    }

    /**
     * 清空选择
     *
     * 取消所有图片的选择状态
     */
    function clearSelection() {
        // 使用Array.from创建快照，避免在遍历时直接修改Set
        Array.from(selectedImages).forEach(imageId => {
            const item = document.querySelector(`[data-id="${imageId}"]`);
            if (item) {
                item.classList.remove('selected');
                const checkbox = item.querySelector('.select-checkbox');
                if (checkbox) checkbox.checked = false;
            }
        });
        selectedImages.clear();
    }

    /**
     * 删除选中的图片
     *
     * 释放选中图片的资源，从数组和 DOM 中移除，清空选择状态
     */
    async function clearAll() {
        if (isProcessing) {
            alert('正在处理中，请稍后...');
            return;
        }
            
        // 如果没有选中的图片，提示用户
        if (selectedImages.size === 0) {
            const statusDiv = document.getElementById('batchStatus');
            statusDiv.innerHTML = '⚠️ 请先选择要删除的图片';
            setTimeout(() => statusDiv.innerHTML = '', 2000);
            return;
        }
            
        // 复制选中的 ID 集合，避免在迭代时修改集合
        const idsToDelete = Array.from(selectedImages);
            
        // 先获取所有要删除的图片数据（在从数组移除之前）
        const imagesToDelete = idsToDelete.map(id => images.find(img => img.id === id)).filter(Boolean);
            
        // 清理存储中的数据
        for (const id of idsToDelete) {
            await storage.delete(`original_${id}`);
            await storage.delete(`current_${id}`);
        }
            
        // 从数组中移除选中的图片
        images = images.filter(img => !selectedImages.has(img.id));
            
        // 从 DOM 中移除选中的图片项
        idsToDelete.forEach(id => {
            const item = document.querySelector(`[data-id="${id}"]`);
            if (item) {
                item.remove();
            }
        });
            
        // 重置选择状态
        selectedImages.clear();
            
        // 更新计数器
        updateImageCounter();
            
        // 如果没有图片了，显示空状态
        if (images.length === 0) {
            showEmptyState();
        }
            
        console.log(`已删除 ${idsToDelete.length} 张选中的图片`);
    }

    /**
     * 删除单张图片
     * @param {string} imageId - 要删除的图片 ID
     * 
     * 从数组和 DOM 中移除图片，同时释放 Blob URL 资源
     */
    async function deleteSingleImage(imageId) {
        if (isProcessing) {
            alert('正在处理中，请稍后...');
            return;
        }
        
        const imageData = images.find(img => img.id === imageId);
        if (!imageData) {
            console.warn('未找到要删除的图片:', imageId);
            return;
        }
        
        // 直接删除，不弹出确认对话框
                
        try {
            // ✅ 清理存储：删除原始图片和当前图片
            await storage.delete(`original_${imageId}`);
            await storage.delete(`current_${imageId}`);
            console.log(`🗑️ 已删除存储数据：original_${imageId}, current_${imageId}`);
                    
            // 从 DOM 中移除图片项
            const item = document.querySelector(`[data-id="${imageId}"]`);
            if (item) {
                item.remove();
            }
            
            // 从数组中移除图片数据
            images = images.filter(img => img.id !== imageId);
            
            // 从选中集合中移除
            selectedImages.delete(imageId);
            
            // 更新计数器
            updateImageCounter();
            
            // 如果没有图片了，显示空状态
            if (images.length === 0) {
                showEmptyState();
            }
            
            console.log('已删除图片:', imageData.name);
        } catch (error) {
            console.error('删除图片时出错:', error);
            alert('删除图片失败: ' + (error.message || '未知错误'));
        }
    }

    /**
     * 处理单张图片（用户界面调用）
     * 提供用户界面级别的单张图片处理功能
     * 
     * @param {string} imageId - 图片ID
     * @param {string} operation - 操作类型：'encrypt'|'decrypt'|'restore'|'save'
     */
    async function processSingle(imageId, operation) {
        if (isProcessing) return;

        isProcessing = true;
        const imageData = images.find(img => img.id === imageId);
        if (!imageData) {
            isProcessing = false;
            return;
        }

        const statusDiv = document.getElementById('batchStatus');
        
        try {
            if (operation === 'save') {
                // 保存操作：调用单独的保存函数
                await saveSingleImage(imageId);
            } else {
                // 显示处理中遮罩
                const item = document.querySelector(`[data-id="${imageId}"]`);
                let overlay = null;
                if (item) {
                    overlay = document.createElement('div');
                    overlay.className = 'processing-overlay';
                    overlay.innerHTML = '<div class="loading"></div>';
                    item.querySelector('.thumbnail-container').appendChild(overlay);
                }

                await processSingleImage(imageData, operation);

                statusDiv.innerHTML = `✅ "${imageData.name}" 处理完成`;
                setTimeout(() => statusDiv.innerHTML = '', 2000);
            }
        } catch (error) {
            console.error('处理失败:', error);
            statusDiv.innerHTML = `❌ "${imageData.name}" 处理失败`;
            setTimeout(() => statusDiv.innerHTML = '', 2000);
        } finally {
            // 简化遮罩清理：直接移除overlay（如果存在）
            if (operation !== 'save') {
                const overlay = document.querySelector(`[data-id="${imageId}"] .processing-overlay`);
                overlay?.remove();
            }
            isProcessing = false;
        }
    }

    /**
     * 处理文件添加
     * @param {File[]} files - 文件数组
     *
     * 处理通过拖拽或文件选择添加的图片文件
     */
    async function handleFiles(files) {
        let addedCount = 0;
        let errorCount = 0;

        for (const file of files) {
            // 检查是否为 ZIP 文件
            const isZip = file.type === 'application/zip' || 
                          file.name.toLowerCase().endsWith('.zip');
            
            if (isZip) {
                // 处理 ZIP 文件
                const result = await extractZipAndAddImages(file);
                addedCount += result.added;
                errorCount += result.errors.length;
                continue;
            }
            
            // 原有图片处理逻辑
            if (!isValidImageFile(file)) {
                logError(file.name, '不是有效的图片文件');
                errorCount++;
                continue;
            }

            try {
                await addImage(file);
                addedCount++;
            } catch (error) {
                console.error(`添加图片失败：${file.name}`, error);
                logError(file.name, `添加失败: ${error.message || '未知错误'}`);
                errorCount++;
            }
        }

        let message = '';
        if (addedCount > 0 && errorCount > 0) {
            message = ` 已添加 ${addedCount} 张图片， ${errorCount} 个文件被拒绝或读取失败`;
        } else if (addedCount > 0) {
            message = ` 已添加 ${addedCount} 张图片`;
        } else if (errorCount > 0) {
            message = ` 所有 ${errorCount} 个文件都被拒绝或读取失败`;
        }

        if (message) {
            const statusDiv = document.getElementById('batchStatus');
            statusDiv.innerHTML = message;
            setTimeout(() => statusDiv.innerHTML = '', 3000);
        }
    }



    /**
     * 验证文件是否为图片
     * @param {File} file - 文件对象
     * @returns {boolean} 是否为有效的图片文件
     *
     * 检查文件的MIME类型和扩展名来确定是否为图片
     */
    function isValidImageFile(file) {
        // 检查MIME类型
        const validMimeTypes = [
            'image/jpeg',
            'image/jpg',
            'image/png',
            'image/gif',
            'image/webp',
            'image/svg+xml',
            'image/bmp',
            'image/tiff'
        ];

        if (validMimeTypes.includes(file.type.toLowerCase())) {
            return true;
        }

        // 检查文件扩展名
        const fileName = file.name.toLowerCase();
        const validExtensions = ['.jpg', '.jpeg', '.png', '.gif', '.webp', '.bmp', '.tiff', '.svg'];

        return validExtensions.some(ext => fileName.endsWith(ext));
    }

    /**
     * 按照 Viewer.js 最佳实践实现的图片预览功能
     * @param {string} imageId - 要预览的图片 ID
     * 
     * 遵循 Viewer.js 官方推荐的实现方式：
     * 1. 使用图片容器作为 Viewer 的目标元素
     * 2. 利用 Viewer.js 的内置生命周期事件
     * 3. 实现完善的资源管理和错误处理
     * 4. 支持优雅降级到基础查看器
     * 
     * 新增取消机制防止竞态条件：
     * - 使用取消令牌避免多个预览实例同时存在
     * - 快速连续点击时自动取消前一个操作
     */
    async function showPreview(imageId) {
        const imageData = images.find(img => img.id === imageId);
        if (!imageData) {
            console.warn('未找到指定图片:', imageId);
            return;
        }
        
        // 1. 彻底清理所有残留预览容器和实例
        const existingContainers = document.querySelectorAll('.image-gallery-container');
        existingContainers.forEach(container => {
            if (container.parentNode) container.parentNode.removeChild(container);
        });
        cleanupExistingViewer();
        
        // 2. 重置取消标志和控制器
        previewCanceled = false;
        currentPreviewController = new AbortController();
        
        // 3. 创建新容器
        const galleryContainer = await createImageGalleryContainer();
                
        try {
            // 4. 等待 Viewer 资源加载并初始化
            await getViewerLoadPromise();
                
            if (previewCanceled) {
                if (galleryContainer.parentNode) galleryContainer.parentNode.removeChild(galleryContainer);
                return;
            }
                
            if (!window.Viewer) throw new Error('Viewer.js 不可用');
                
            await initializeViewerWithBestPractices(imageData, galleryContainer, imageId);
        } catch (error) {
            if (previewCanceled) return;
            console.error('Viewer 初始化失败:', error);
            await handleViewerInitializationFailure(galleryContainer, imageData);
        }
    }

    /**
     * 取消之前的预览操作
     * 防止多个预览实例同时存在造成内存泄漏
     */
    function cancelPreviousPreview() {
        // 设置取消标志
        previewCanceled = true;
        
        // 取消之前的Promise链
        if (currentPreviewController) {
            currentPreviewController.abort();
            currentPreviewController = null;
        }
        
        // 清理已存在的viewer实例
        cleanupExistingViewer();
        
        console.log('🔄 已取消之前的预览操作');
    }
    
    /**
     * 清理已存在的 viewer 实例
     */
    function cleanupExistingViewer() {
        if (viewerInstance) {
            try {
                viewerInstance.destroy();
                console.log('✅ 已销毁之前的 viewer 实例');
            } catch (error) {
                console.warn('⚠️ 销毁 viewer 实例时出错:', error);
            } finally {
                viewerInstance = null;
            }
        }
        // 额外清理所有残留容器
        document.querySelectorAll('.image-gallery-container').forEach(container => {
            if (container.parentNode) container.parentNode.removeChild(container);
        });
    }

    /**
     * 创建图片画廊容器
     * @returns {Promise<HTMLElement>} 容器元素
     */
    async function createImageGalleryContainer() {
        const container = document.createElement('div');
        container.className = 'image-gallery-container';
        container.style.cssText = `
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            overflow: hidden;
        `;
        
        // 预先创建所有图片元素，按顺序同步添加到 DOM，然后等待它们加载完成
        const imgElements = new Array(images.length); // 预分配数组
        console.log(`📊 开始创建图片元素，共 ${images.length} 张`);
        
        const loadPromises = images.map((imgData, index) => {
            return new Promise((resolve, reject) => {
                storage.get(`current_${imgData.id}`).then(blob => {
                    if (!blob) throw new Error(`图片数据不存在：${imgData.name}`);

                    const blobUrl = URL.createObjectURL(blob);
                    const img = document.createElement('img');
                    img.src = blobUrl;
                    img.alt = imgData.name || `图片 ${index + 1}`;
                    img.dataset.imageId = imgData.id;
                    img.dataset.index = index.toString();
                    img.dataset.blobUrl = blobUrl;
                    img.loading = 'eager';

                    // 保存引用到数组（保持顺序）- 在创建 img 后立即同步赋值
                    imgElements[index] = img;
                    console.log(`✅ [索引${index}] 已创建图片元素：${imgData.name}`);

                    const timeoutId = setTimeout(() => {
                        console.warn(`⏰ 图片 ${imgData.name} 加载超时`);
                        reject(new Error(`图片加载超时：${imgData.name}`));
                    }, 5000);

                    img.onload = () => {
                        clearTimeout(timeoutId);
                        console.log(`✅ 图片 ${img.alt} 加载完成 (${img.naturalWidth}x${img.naturalHeight})`);
                        resolve(img);
                    };

                    img.onerror = () => {
                        clearTimeout(timeoutId);
                        console.error(`❌ 图片 ${imgData.name} 加载失败`);
                        // 显示占位图并继续
                        img.src = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iI2Y1ZjVmNSIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iMTIiIGZpbGw9IiM5OTkiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGRvbWluYW50LWJhc2VsaW5lPSJtaWRkbGUiPkxvYWQgRmFpbGVkPC90ZXh0Pjwvc3ZnPg==';
                        resolve(img); // 即使失败也继续
                    };
                }).catch(error => {
                    console.error(`图片 ${imgData.name} 加载异常:`, error);
                    reject(error);
                });
            });
        });
        
        // 等待所有图片元素创建完成后再添加到 DOM
        await Promise.allSettled(loadPromises);
        
        console.log(`📊 Map 完成：imgElements 长度=${imgElements.length}, 已赋值=${imgElements.filter(x => x).length}`);
        
        // 按顺序将所有图片添加到容器（保证 DOM 顺序与 images 数组一致）
        imgElements.forEach((img, index) => {
            if (img) {
                container.appendChild(img);
            } else {
                console.warn(`⚠️ 图片索引 ${index} 对应的元素未创建成功`);
            }
        });
        
        console.log(`📊 共创建 ${imgElements.length} 个图片元素，实际添加到 DOM ${container.children.length} 个`);
        
        // 存储加载 Promise 到容器（已经完成了）
        container._loadPromises = Promise.resolve();
        
        document.body.appendChild(container);
        return container;
    }

    /**
     * 在 Viewer.js 准备就绪后初始化查看器
     * @param {Object} imageData - 图片数据
     * @param {HTMLElement} container - 容器元素
     * @param {string} targetImageId - 目标图片 ID
     */
    async function initializeViewerWhenReady(imageData, container, targetImageId) {
        // 检查是否已被取消
        if (previewCanceled) {
            console.log('⏭️ 预览操作已被取消，跳过初始化');
            // 清理容器
            if (container && container.parentNode) {
                container.parentNode.removeChild(container);
            }
            return;
        }
            
        try {
            await getViewerLoadPromise();
                
            // 再次检查取消状态
            if (previewCanceled) {
                console.log('⏭️ 预览操作已被取消，跳过 Viewer 初始化');
                // 清理容器
                if (container && container.parentNode) {
                    container.parentNode.removeChild(container);
                }
                return;
            }
                
            if (!isViewerAvailable()) {
                throw new Error('Viewer.js 构造函数不可用');
            }
            await initializeViewerWithBestPractices(imageData, container, targetImageId);
        } catch (error) {
            // 检查是否因取消而产生的错误
            if (previewCanceled) {
                console.log('⏭️ 预览操作已被取消，忽略错误:', error.message);
                return;
            }
                
            console.error('❌ Viewer.js 初始化失败:', error);
            await handleViewerInitializationFailure(container, imageData);
        }
    }

    /**
     * 检查Viewer.js是否可用
     * @returns {boolean} 是否可用
     */
    function isViewerAvailable() {
        return window.hasOwnProperty('Viewer') && 
               typeof window.Viewer === 'function';
    }
        
    /**
     * 按照最佳实践初始化 Viewer.js
     * @param {Object} imageData - 图片数据
     * @param {HTMLElement} container - 容器元素
     * @param {string} targetImageId - 目标图片 ID
     */
    async function initializeViewerWithBestPractices(imageData, container, targetImageId) {
        // 最终检查取消状态
        if (previewCanceled) {
            console.log('⏭️ 预览操作已被取消，跳过 Viewer 实例创建');
            // 清理容器
            if (container && container.parentNode) {
                container.parentNode.removeChild(container);
            }
            return;
        }
            
        try {
            // 等待所有图片至少尝试加载完成
            if (container._loadPromises) {
                console.log('⏳ 等待图片加载完成...');
                await container._loadPromises;
                console.log('✅ 所有图片加载尝试完成');
            }
                
            // 额外等待一小段时间，确保 DOM 渲染完成
            await new Promise(resolve => setTimeout(resolve, 100));
                
            // @ts-ignore - Viewer.js 是动态加载的，忽略类型检查
            const ViewerConstructor = window.Viewer;
                
            viewerInstance = new ViewerConstructor(container, {
                // 基础配置
                inline: false,
                backdrop: true,
                loading: true,
                
                // 导航和交互
                keyboard: true,
                focus: true,
				loop: true,
                
                // UI组件
                button: true,
                navbar: true,
                toolbar: getOptimizedToolbarConfig(),
                title: false,
                
                // 行为配置
                movable: true,
                zoomable: true,
                rotatable: true,
                scalable: true,
                transition: false,   // 关闭动画
                fullscreen: true,
                
                // 过滤器：优化图片加载判断逻辑
                filter(image) {
                    // 更宽松的图片过滤条件，确保所有图片都能被加载
                    const isLoaded = image.complete || image.readyState === 4 || image.naturalWidth > 0;
                    if (isLoaded) {
                        return true;
                    }
                    // 对于未完成加载的图片，也允许 Viewer.js 加载
                    // Viewer.js 会在内部等待图片加载完成
                    console.log(`🔄 图片 ${image.alt} 尚未完全加载，Viewer.js 将等待其加载完成`);
                    return true;
                },
                
                // 生命周期事件
                ready() {
                    console.log('✅ Viewer.js 已准备就绪');
                },
                                
                shown() {
                    // 统计加载成功和失败的图片
                    const viewerImages = container.querySelectorAll('img');
                    let loadedCount = 0;
                    let failedImages = [];
                    
                    viewerImages.forEach((img, idx) => {
                        if (img.complete && img.naturalWidth > 0) {
                            loadedCount++;
                        } else {
                            failedImages.push(idx + 1);
                        }
                    });
                    
                    if (failedImages.length === 0) {
                        console.log(`✅ 已加载${loadedCount}张图片`);
                    } else {
                        console.log(`✅ 已加载${loadedCount}张图片，图片${failedImages.join('、')}失败`);
                    }
                },
                                
                viewed(event) {
                    const { detail } = event;
                    const currentImage = detail.image;
                    const currentIndex = detail.index;
                    console.log(`✅ 当前查看图片：${currentImage.alt || '未知'} (索引：${currentIndex})`);
                                    
                    // 每次切换图片时检查加载状态
                    if (!currentImage.complete || currentImage.naturalWidth === 0) {
                        console.warn('⚠️ 当前图片尚未加载完成');
                    }
                },
                
                hide() {
                    console.log('ℹ️ Viewer.js 开始隐藏');
                },
                
                hidden() {
                    console.log('✅ Viewer.js 已隐藏');
                    cleanupViewerResources(container);
                },
                
                play() {
                    console.log('▶️ 全屏');
                }
            });
            
            // 显示查看器
            viewerInstance.show();
                        
            // 延迟一小段时间确保 DOM 完全渲染
            await new Promise(resolve => setTimeout(resolve, 50));
            
            // 定位到目标图片 - 通过 data-imageId 属性查找 DOM 中的实际位置
            const targetImg = container.querySelector(`img[data-image-id="${targetImageId}"]`);
            if (targetImg) {
                const domIndex = Array.from(container.children).indexOf(targetImg);
                console.log(`🔍 容器中共有 ${container.children.length} 张图片`);
                console.log(`🎯 找到目标图片，DOM 索引：${domIndex}`);
                viewerInstance.view(domIndex);
            } else {
                // 详细调试信息
                console.error(`❌ 未在 DOM 中找到目标图片：${targetImageId}`);
                console.log(`📊 容器中的图片元素:`);
                Array.from(container.children).forEach((img, idx) => {
                    const imageId = img.dataset?.imageId || '无 ID';
                    console.log(`  [${idx}] ID: ${imageId}, Alt: ${img.alt}`);
                });
                                
                // 尝试使用 Viewer.js 的 images 数组访问（Viewer.js 1.x 使用 images 而非 list）
                if (viewerInstance && viewerInstance.images) {
                    console.log(`📋 Viewer.js images 中有 ${viewerInstance.images.length} 张图片`);
                    viewerInstance.images.forEach((img, idx) => {
                        const imageId = img.dataset?.imageId || '无 ID';
                        console.log(`  [${idx}] ID: ${imageId}, Alt: ${img.alt}`);
                    });
                                    
                    // 尝试在 Viewer.js 的 images 中查找
                    const foundIndex = viewerInstance.images.findIndex(img => img.dataset?.imageId === targetImageId);
                    if (foundIndex >= 0) {
                        console.log(`✅ 在 Viewer.js images 中找到目标图片，索引：${foundIndex}`);
                        viewerInstance.view(foundIndex);
                    }
                }
            }
            
        } catch (error) {
            console.error('❌ Viewer.js 初始化过程中发生错误:', error);
            handleViewerInitializationFailure(container, imageData);
        }
    }

    /**

    function getOptimizedToolbarConfig() {

    /**
     * 获取图片标题函数
     * @returns {Function} 标题生成函数
     */
    function getImageTitleFunction() {
        return (image, imageData) => {
            const baseName = image.alt || '未知图片';
            const dimensions = imageData.naturalWidth && imageData.naturalHeight 
                ? ` (${imageData.naturalWidth} × ${imageData.naturalHeight})`
                : '';
            const currentIndex = Array.from(image.parentNode.children).indexOf(image) + 1;
            const totalImages = image.parentNode.children.length;
            
            return `${baseName}${dimensions} - ${currentIndex}/${totalImages}`;
        };
    }

    /**
     * 处理 Viewer.js 初始化失败的情况
     * @param {HTMLElement} container - 容器元素
     * @param {Object} imageData - 图片数据
     */
    async function handleViewerInitializationFailure(container, imageData) {
        // 检查是否因取消而失败
        if (previewCanceled) {
            console.log('⏭️ 预览操作已被取消，跳过失败处理');
            // 清理容器
            if (container && container.parentNode) {
                container.parentNode.removeChild(container);
            }
            return;
        }
            
        // 清理容器
        if (container && container.parentNode) {
            container.parentNode.removeChild(container);
        }
            
        // 启用基础图片查看器作为兜底方案
        console.log('ℹ️ 启用基础图片查看器作为替代方案');
            
        // 获取当前图片 Blob 并创建临时 URL
        try {
            const blob = await storage.get(`current_${imageData.id}`);
            if (blob) {
                const url = URL.createObjectURL(blob);
                showBasicImageViewer({ blobUrl: url, originalName: imageData.name });
                // 延迟释放 URL，确保图片加载完成
                setTimeout(() => {
                    URL.revokeObjectURL(url);
                    console.log('🔓 已释放临时 Blob URL');
                }, 1000);
            } else {
                console.error('无法获取图片数据:', imageData.id);
            }
        } catch (error) {
            console.error('获取图片 Blob 失败:', error);
        }
    }

    /**
     * 清理 Viewer.js 相关资源
     * @param {HTMLElement} container - 容器元素
     */
    function cleanupViewerResources(container) {
        if (viewerInstance) {
            try {
                viewerInstance.destroy();
            } catch (e) {
                console.warn('销毁 Viewer 实例出错:', e);
            }
            viewerInstance = null;
        }
        if (container && container.parentNode) {
            // 释放所有临时 blob URL
            const imgs = container.querySelectorAll('img');
            imgs.forEach(img => {
                const url = img.dataset.blobUrl;
                if (url && url.startsWith('blob:')) {
                    URL.revokeObjectURL(url);
                    console.log(`🔓 已释放临时 Blob URL`);
                }
            });
            container.parentNode.removeChild(container);
        }
        console.log('✅ Viewer.js 资源已清理');
    }
    
    /**
     * 窗口大小改变时的防抖处理
     * 避免频繁调用 update 导致性能问题
     */
    let resizeDebounceTimer = null;
    function handleWindowResize() {
        // 清除之前的定时器
        if (resizeDebounceTimer) {
            clearTimeout(resizeDebounceTimer);
        }
        
        // 防抖延迟 150ms
        resizeDebounceTimer = setTimeout(() => {
            if (viewerInstance && viewerInstance.update) {
                viewerInstance.update();
                console.log('🪟 窗口大小改变，已更新 Viewer 布局');
            }
        }, 150);
    }

    window.addEventListener('beforeunload', () => {

        // 重置Viewer加载Promise状态
        window.viewerLoadPromise = null;
        console.log('页面卸载：已重置Viewer加载Promise');
        
        // 清空像素缓冲区池
        pixelBufferPool.length = 0;
        console.log('页面卸载：已清空像素缓冲区池');
        
        // 清理所有残留的处理遮罩层
        const cleanedOverlays = cleanupAllProcessingOverlays();
        if (cleanedOverlays > 0) {
            console.log(`页面卸载时清理了 ${cleanedOverlays} 个遮罩层`);
        }
        
        // 清理所有图片的Blob URL资源
        cleanupAllImageResources();
    });
    
    // 页面可见性变化处理
    window.addEventListener('visibilitychange', () => {
        if (document.hidden) {
            // 页面隐藏时的智能清理策略

            // 清理残留的处理遮罩层

            // 清空像素缓冲区池

            console.log('页面隐藏：已执行智能Canvas池清理');
        } else {
            // 页面重新可见时预创建常用尺寸的Canvas
            preCreateCommonCanvases();
            console.log('页面可见：已预创建常用Canvas');
        }
    });
