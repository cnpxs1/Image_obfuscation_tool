    <!-- fflate 库智能加载 - ZIP 压缩/解压 | 许可证：MIT License -->
    <script>
        // fflate 资源加载状态
        window.fflateResources = {
            loaded: false,
            loading: false,
            failed: false
        };
        
        function loadFflate(cdnUrl, fallbackUrls, index = 0) {
            if (window.fflateResources.loaded || window.fflateResources.loading) return;
            window.fflateResources.loading = true;
            
            const script = document.createElement('script');
            script.src = cdnUrl;
            script.onload = () => {
                window.fflateResources.loaded = true;
                window.fflateResources.loading = false;
                console.log('fflate 加载成功:', cdnUrl);
            };
            script.onerror = () => {
                console.warn('fflate 加载失败:', cdnUrl);
                window.fflateResources.loading = false;
                if (index < fallbackUrls.length) {
                    loadFflate(fallbackUrls[index], fallbackUrls, index + 1);
                } else {
                    window.fflateResources.failed = true;
                    console.error('fflate 所有源均加载失败，ZIP 功能将不可用');
                    // 禁用 ZIP 下载开关
                    const zipToggle = document.getElementById('zip-download-toggle');
                    if (zipToggle) {
                        zipToggle.disabled = true;
                        zipToggle.title = 'fflate 库加载失败，ZIP 功能不可用';
                    }
                }
            };
            document.head.appendChild(script);
        }

        // 优先级：jsDelivr -> unpkg -> 本地
        loadFflate(
            'https://fastly.jsdelivr.net/npm/fflate@0.8.2/umd/index.min.js',
            [
                'https://unpkg.com/fflate@0.8.2/umd/index.js',
                './assets/fflate/fflate.js'
            ]
        );
    </script>

    <!-- Viewer.js JavaScript 智能加载 -->
    <script>
        // Viewer.js 资源加载状态
        window.viewerResources = {
            cssLoaded: false,
            jsLoaded: false,
            localFallback: false,
            promptShown: false,  // 标记是否已显示过提示
            currentCDN: null,    // 当前使用的CDN
            cssTimeout: null,    // CSS加载超时定时器
            jsTimeout: null      // JS加载超时定时器
        };
        
        // 统一的 Viewer.js 加载 Promise
        window.viewerLoadPromise = null;
        
        // 获取 Viewer.js 加载 Promise
        function getViewerLoadPromise() {
            if (window.viewerLoadPromise) {
                return window.viewerLoadPromise;
            }
            
            window.viewerLoadPromise = new Promise((resolve, reject) => {
                // 如果已经加载完成，直接 resolve
                if (window.viewerResources.jsLoaded && window.viewerResources.cssLoaded) {
                    resolve();
                    return;
                }
                
                // 检查是否已完全失败
                if (window.viewerResources.localFallback) {
                    reject(new Error('Viewer.js 资源加载失败'));
                    return;
                }
                
                // 监听加载状态变化
                let undefinedViewerCount = 0; // 连续未定义计数器
                const MAX_UNDEFINED_ATTEMPTS = 5; // 最大连续未定义次数
                
                const checkLoadStatus = () => {
                    // 优先检查是否已完全失败
                    if (window.viewerResources.localFallback) {
                        reject(new Error('Viewer.js 资源加载失败'));
                        return true;
                    }
                    
                    if (window.viewerResources.jsLoaded && window.viewerResources.cssLoaded) {
                        // 额外验证 Viewer 构造函数是否真正可用
                        if (window.hasOwnProperty('Viewer') && window.Viewer) {
                            console.log('Viewer.js 资源加载完成且 Viewer 构造函数可用');
                            resolve();
                            return true;
                        } else {
                            undefinedViewerCount++;
                            console.warn(`资源标记为已加载但 Viewer 构造函数不可用 (${undefinedViewerCount}/${MAX_UNDEFINED_ATTEMPTS})`);
                            
                            // 如果连续多次未定义，主动reject
                            if (undefinedViewerCount >= MAX_UNDEFINED_ATTEMPTS) {
                                console.error('Viewer 构造函数连续未定义，主动终止加载');
                                reject(new Error('Viewer 构造函数无法加载'));
                                return true;
                            }
                        }
                    }
                    return false;
                };
                
                // 立即检查一次
                if (checkLoadStatus()) return;
                
                // 设置定期检查
                const interval = setInterval(() => {
                    if (checkLoadStatus()) {
                        clearInterval(interval);
                    }
                }, 100);
                
                // 设置超时
                setTimeout(() => {
                    clearInterval(interval);
                    if (!window.viewerResources.jsLoaded || !window.viewerResources.cssLoaded) {
                        console.error('Viewer.js 加载超时');
                        reject(new Error('Viewer.js 加载超时'));
                    }
                }, 5000); // 缩短至5秒
            });
            
            return window.viewerLoadPromise;
        }
        
        // CDN降级加载函数
        function loadCDNFallback(resourceType, failedCDN) {
            console.log(`${failedCDN} ${resourceType} 加载失败，尝试降级到下一个CDN`);
            
            if (resourceType === 'css') {
                // 清除CSS超时定时器
                if (window.viewerResources.cssTimeout) {
                    clearTimeout(window.viewerResources.cssTimeout);
                    window.viewerResources.cssTimeout = null;
                }
                
                if (failedCDN === 'bootcdn') {
                    // 从bootcdn降级到cdnjs - 动态创建链接
                    console.log('尝试加载 cdnjs CSS');
                    const cdnjsCss = document.createElement('link');
                    cdnjsCss.id = 'viewer-css-cdnjs';
                    cdnjsCss.rel = 'stylesheet';
                    cdnjsCss.href = 'https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.11.7/viewer.min.css';
                    cdnjsCss.onload = () => {
                        if(window.viewerResources) {
                            window.viewerResources.cssLoaded = true; 
                            window.viewerResources.currentCDN = 'cdnjs';
                            console.log('cdnjs CSS 加载成功');
                        }
                    };
                    cdnjsCss.onerror = () => {
                        console.log('cdnjs CSS 加载失败，尝试本地资源');
                        loadLocalViewerCss();
                    };
                    document.head.appendChild(cdnjsCss);
                    
                    // 设置超时检测
                    window.viewerResources.cssTimeout = setTimeout(() => {
                        if (!window.viewerResources.cssLoaded) {
                            console.log('cdnjs CSS 加载超时，尝试本地资源');
                            loadLocalViewerCss();
                        }
                    }, 3000);
                } else {
                    // cdnjs也失败了，加载本地资源
                    loadLocalViewerCss();
                }
            } else if (resourceType === 'js') {
                // 清除JS超时定时器
                if (window.viewerResources.jsTimeout) {
                    clearTimeout(window.viewerResources.jsTimeout);
                    window.viewerResources.jsTimeout = null;
                }
                
                if (failedCDN === 'bootcdn') {
                    // 从bootcdn降级到cdnjs
                    console.log('尝试加载 cdnjs JS');
                    loadCDNJSViewerJs();
                } else {
                    // cdnjs也失败了，加载本地资源
                    loadLocalViewerJs();
                }
            }
        }
        
        // 加载cdnjs的JS资源
        function loadCDNJSViewerJs() {
            if (window.viewerResources.localFallback) return;
            
            console.log('尝试加载 cdnjs Viewer.js JS');
            const cdnjsScript = document.createElement('script');
            cdnjsScript.src = 'https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.11.7/viewer.min.js';
            cdnjsScript.onload = () => {
                window.viewerResources.jsLoaded = true;
                window.viewerResources.currentCDN = 'cdnjs';
                console.log('cdnjs Viewer.js JS 加载成功');

                if (window.viewerResources.jsTimeout) {
                    clearTimeout(window.viewerResources.jsTimeout);
                    window.viewerResources.jsTimeout = null;
                }
            };
            cdnjsScript.onerror = () => {
                console.log('cdnjs Viewer.js JS 加载失败');
                loadLocalViewerJs();
            };
            document.head.appendChild(cdnjsScript);
            
            // 设置超时检测
            window.viewerResources.jsTimeout = setTimeout(() => {
                if (!window.viewerResources.jsLoaded) {
                    console.log('cdnjs JS 加载超时，尝试本地资源');
                    loadLocalViewerJs();
                }
            }, 3000);
        }
        
        // 加载本地 CSS 资源 | 许可证：MIT License（详见页面底部「开源许可证」入口）
        function loadLocalViewerCss() {
            if (window.viewerResources.localFallback) return;
            
            console.log('CDN 加载失败，尝试加载本地 Viewer.js CSS');
            const localCss = document.createElement('link');
            localCss.rel = 'stylesheet';

                window.viewerResources.cssLoaded = true;

            localCss.onerror = () => {
                console.error('本地 Viewer.js CSS 加载失败');
                // CSS和JS都失败时，启用基础查看器模式
                window.viewerResources.localFallback = true;
                console.log('Viewer.js CSS资源完全不可用，启用基础图片查看器模式');
                
                // 首次完全失败时显示提示
                if (!window.viewerResources.promptShown) {
                    window.viewerResources.promptShown = true;
                    setTimeout(() => {
                        alert('\u274C Viewer.js 资源加载失败\n\n系统将使用基础图片查看器为您展示图片。\n如需完整功能，请检查网络连接或本地资源后刷新页面。');
                    }, 100);
                }
            };
            document.head.appendChild(localCss);
        }
        
        // 加载本地 JavaScript | 许可证：MIT License（详见页面底部「开源许可证」入口）
        function loadLocalViewerJs() {
            if (window.viewerResources.localFallback) return;
            
            console.log('CDN 加载失败，尝试加载本地 Viewer.js JS');
            
            const localJs = document.createElement('script');
            localJs.src = './assets/viewerjs/viewer.min.js';
            localJs.onload = () => {
                window.viewerResources.jsLoaded = true;
                window.viewerResources.currentCDN = 'local';
                console.log('本地 Viewer.js JS 加载成功');
                // 清除JS超时定时器
                if (window.viewerResources.jsTimeout) {
                    clearTimeout(window.viewerResources.jsTimeout);
                    window.viewerResources.jsTimeout = null;
                }
            };
            localJs.onerror = () => {
                console.error('本地 Viewer.js JS 加载失败');
                // JS失败时也启用基础查看器模式
                window.viewerResources.localFallback = true;
                console.log('Viewer.js JS资源完全不可用，启用基础图片查看器模式');
                
                // 首次完全失败时显示提示
                if (!window.viewerResources.promptShown) {
                    window.viewerResources.promptShown = true;
                    setTimeout(() => {
                        alert('\u274C Viewer.js 资源加载失败\n\n系统将使用基础图片查看器为您展示图片。\n如需完整功能，请检查网络连接或本地资源后刷新页面。');
                    }, 100);
                }
            };
            document.head.appendChild(localJs);
        }
        
        // 基础图片查看器 - 当所有Viewer.js 资源都失效时的兜底方案
        function showBasicImageViewer(imageData) {
            console.log('启动基础图片查看器');
            
            // 清理可能存在的旧实例
            const existingViewer = document.querySelector('[data-basic-viewer]');
            if (existingViewer) {
                existingViewer.remove();
            }
            
            // 创建基础查看器容器
            const viewerContainer = document.createElement('div');
            viewerContainer.setAttribute('data-basic-viewer', 'true');
            viewerContainer.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                background: rgba(0, 0, 0, 0.9);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 10000;
                cursor: zoom-out;
            `;
            
            // 创建图片容器
            const imgContainer = document.createElement('div');
            imgContainer.style.cssText = `
                position: relative;
                max-width: 90vw;
                max-height: 90vh;
                display: flex;
                align-items: center;
                justify-content: center;
            `;
            
            // 创建图片元素
            const img = document.createElement('img');
            img.src = imageData.blobUrl || imageData.url;
            img.alt = escapeHtml(imageData.originalName);
            img.style.cssText = `
                max-width: 100%;
                max-height: 100%;
                object-fit: contain;
            `;
            
            // 添加加载状态
            const loadingIndicator = document.createElement('div');
            loadingIndicator.textContent = '图片加载中...';
            loadingIndicator.style.cssText = `
                position: absolute;
                color: white;
                font-size: 16px;
                background: rgba(0, 0, 0, 0.7);
                padding: 10px 20px;
                border-radius: 4px;
                display: block;
            `;
            
            imgContainer.appendChild(loadingIndicator);
            imgContainer.appendChild(img);
            viewerContainer.appendChild(imgContainer);
            
            // 添加关闭按钮（使用Viewer.css样式）
            const closeBtn = document.createElement('button');
            closeBtn.innerHTML = '×';
            closeBtn.style.cssText = `
                position: absolute;
                right: 20px;
                top: 20px;
                width: 40px;
                height: 40px;
                background-color: rgba(0, 0, 0, 0.5);
                border: none;
                border-radius: 50%;
                color: white;
                font-size: 24px;
                font-weight: normal;
                line-height: 1;
                cursor: pointer;
                transition: background-color 0.15s;
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 10001;
            `;
            
            closeBtn.onmouseenter = () => {
                closeBtn.style.backgroundColor = 'rgba(0, 0, 0, 0.8)';
            };
            
            closeBtn.onmouseleave = () => {
                closeBtn.style.backgroundColor = 'rgba(0, 0, 0, 0.5)';
            };
            
            viewerContainer.appendChild(closeBtn);
            
            // 不显示图片信息和操作提示
            
            // 禁用页面滚动
            document.body.style.overflow = 'hidden';
            
            // 添加到页面
            document.body.appendChild(viewerContainer);
            
            // 图片加载完成处理
            img.onload = () => {
                loadingIndicator.style.display = 'none';
                console.log('基础查看器：图片加载完成');
            };
            
            img.onerror = () => {
                loadingIndicator.textContent = '图片加载失败';
                loadingIndicator.style.color = '#ff6b6b';
                console.error('基础查看器：图片加载失败');
            };
            
            // 关闭查看器的函数
            function closeBasicViewer() {
                // 清理通过 addEventListener 添加的事件监听器
                cleanupEventListeners();
                            
                // 清理全局事件监听器
                document.removeEventListener('keydown', escHandler);
                            
                // 移除查看器容器
                if (viewerContainer.parentNode) {
                    viewerContainer.parentNode.removeChild(viewerContainer);
                }
                            
                // 重新启用页面滚动
                document.body.style.overflow = '';
                            
                // 清理图片资源
                if (img) {
                    img.onload = null;
                    img.onerror = null;
                    img.onclick = null;
                    // 释放 Blob URL（如果存在）
                    if (img.src && img.src.startsWith('blob:')) {
                        try {
                            URL.revokeObjectURL(img.src);
                            console.log('🔓 已释放基础查看器的 Blob URL');
                        } catch (error) {
                            console.warn('释放 Blob URL 失败:', error);
                        }
                    }
                }
                            
                // 清理按钮事件
                if (closeBtn) {
                    closeBtn.onclick = null;
                    closeBtn.onkeydown = null;
                    closeBtn.onmouseenter = null;
                    closeBtn.onmouseleave = null;
                }
                            
                console.log('基础查看器已关闭并清理资源');
            }
            
            // 绑定关闭事件
            viewerContainer.onclick = closeBasicViewer;
            
            // 确保关闭按钮事件正确绑定
            const clickHandler = (e) => {
                e.stopPropagation();
                e.preventDefault();
                closeBasicViewer();
            };
            
            const keydownHandler = (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    closeBasicViewer();
                }
            };
            
            closeBtn.addEventListener('click', clickHandler);
            closeBtn.addEventListener('keydown', keydownHandler);
            
            // 在关闭函数中添加对应的移除操作
            const cleanupEventListeners = () => {
                closeBtn.removeEventListener('click', clickHandler);
                closeBtn.removeEventListener('keydown', keydownHandler);
            };
            
            // 确保按钮可获得焦点
            closeBtn.tabIndex = 0;
            
            // ESC 键关闭
            const escHandler = (e) => {
                if (e.key === 'Escape') {
                    closeBasicViewer();
                    document.removeEventListener('keydown', escHandler);
                }
            };
            document.addEventListener('keydown', escHandler);
            
            // 防止事件冒泡到容器
            img.onclick = (e) => e.stopPropagation();
            imgContainer.onclick = (e) => e.stopPropagation();
            
            console.log('基础图片查看器启动成功');
        }
        
        // 检查 Viewer.js 是否已加载
        function checkViewerLoaded() {
            // 检查 CSS 是否加载成功
            const bootcdnCss = document.getElementById('viewer-css');
            const cdnjsCss = document.getElementById('viewer-css-cdnjs');
            
            // 检查bootcdn或cdnjs是否加载成功
            if ((bootcdnCss && bootcdnCss.sheet) || (cdnjsCss && cdnjsCss.sheet)) {
                window.viewerResources.cssLoaded = true;
            }
            
            // 检查 JS 是否加载成功（通过字符串属性访问避免未定义变量）
            if (window.hasOwnProperty('Viewer') && window.Viewer) {
                window.viewerResources.jsLoaded = true;
            }
        }
        
        // 页面加载完成后检查资源状态并设置超时检测
        document.addEventListener('DOMContentLoaded', function() {
            // 使用统一的Promise加载机制，移除独立超时定时器
            
            // 延迟检查资源加载状态
            setTimeout(checkViewerLoaded, 1000);
        });
    </script>

    <script id="viewer-js-bootcdn" src="https://cdn.bootcdn.net/ajax/libs/viewerjs/1.11.7/viewer.min.js" onload="if(window.viewerResources){window.viewerResources.jsLoaded=true; window.viewerResources.currentCDN='bootcdn'}" onerror="loadCDNFallback('js', 'bootcdn')"></script>

<body>
<!-- 缓存方案指示器 -->
<div id="cacheIndicator" title="">加载中...</div>

<div class="main-content" style="text-align: center;">

<script>
    // =============================================
    // 安全函数
    // =============================================
    
    /**
     * HTML 转义函数，防止 XSS 攻击
     * @param {string} str - 需要转义的字符串
     * @returns {string} 转义后的安全字符串
     */
    function escapeHtml(str) {
        if (typeof str !== 'string') return String(str);
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#x27;')
            .replace(/\//g, '&#x2F;');
    }
    
    /**
     * WebP支持检测结果缓存
     * @type {Promise<boolean>|null}
     */
    let webpSupportCache = null;
    
    /**
     * 检测浏览器是否支持WebP格式（带缓存优化）
     * @returns {Promise<boolean>} 是否支持WebP
     * 
     * 优化：首次检测后缓存结果，避免重复创建Canvas检测
     */
    function isWebPSupported() {
        // 如果已有缓存结果，直接返回
        if (webpSupportCache !== null) {
            return webpSupportCache;
        }
        
        // 首次检测并缓存结果
        webpSupportCache = new Promise((resolve) => {
            const canvas = document.createElement('canvas');
            canvas.width = 1;
            canvas.height = 1;
            try {
                canvas.toBlob((blob) => {
                    const supported = blob !== null;
                    console.log(`WebP 支持检测: ${supported ? '支持' : '不支持'}`);
                    resolve(supported);
                }, 'image/webp');
            } catch (e) {
                console.log('WebP 支持检测失败:', e);
                resolve(false);
            }
        });
        
        return webpSupportCache;
    }
    
    /**
     * 全局遮罩层清理函数
     * 清理页面上所有残留的处理中遮罩层
     * 作为异常情况下的最终保障措施
     */
    function cleanupAllProcessingOverlays() {
        try {
            const allOverlays = document.querySelectorAll('.processing-overlay');
            let cleanedCount = 0;
            
            allOverlays.forEach(overlay => {
                if (overlay && overlay.parentNode) {
                    overlay.remove();
                    cleanedCount++;
                }
            });
            
            if (cleanedCount > 0) {
                console.log(`已清理 ${cleanedCount} 个残留的处理遮罩层`);
            }
            
            return cleanedCount;
        } catch (error) {
            console.error('全局遮罩层清理失败:', error);
            return 0;
        }
    }
    
    /**
     * 清理所有图片资源
     * 在页面卸载时调用
     */
    function cleanupAllImageResources() {
        // StorageAdapter 中的数据会在页面关闭时自动被浏览器回收
        // 无需额外清理 Blob URL（当前未创建长期 URL）
        console.log('页面卸载：所有图片资源将由浏览器自动回收');
    }
    
    // =============================================
    // 统一存储抽象层 (StorageAdapter)
    // =============================================

    /**
     * 根据当前环境选择存储后端
     * - 非 file 协议且支持 Cache API 时使用 CacheStorage（性能更优）
     * - 否则降级使用 IndexedDB
     */
    class StorageAdapter {
        constructor() {
            this.backend = null;
            this.isCacheApi = false;
            this.dbName = 'ImageObfuscationDB';
            this.storeName = 'imageBlobs';
            this.db = null;
            this.cacheName = 'image-obfuscation-cache-v1';
            this.ready = this._init();
        }
    
        async _init() {
            // 检测是否可以使用 Cache API（排除 file:// 协议）
            const isCacheSupported = typeof window.caches !== 'undefined' && location.protocol !== 'file:';
            if (isCacheSupported) {
                try {
                    // 尝试打开缓存，验证可用性
                    await caches.open(this.cacheName);
                    this.isCacheApi = true;
                    this.backend = await caches.open(this.cacheName);
                    console.log('✅ 使用 Cache API');
                    // 更新 UI 指示器
                    setTimeout(() => updateCacheIndicator('Cache API'), 100);
                    return;
                } catch (e) {
                    console.warn('Cache API 不可用，降级到 IndexedDB', e);
                }
            }
            // 降级到 IndexedDB
            this.isCacheApi = false;
            await this._initIndexedDB();
            console.log('✅ 使用 IndexedDB');
            // 更新 UI 指示器
            setTimeout(() => updateCacheIndicator('IndexedDB'), 100);
        }
    
        async _initIndexedDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(this.dbName, 1);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    this.db = request.result;
                    resolve();
                };
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(this.storeName)) {
                        db.createObjectStore(this.storeName);
                    }
                };
            });
        }
    
        async set(key, blob) {
            await this.ready;
            if (this.isCacheApi) {
                // Cache API 存储 Response 对象
                const response = new Response(blob, {
                    headers: { 'Content-Type': blob.type || 'image/png' }
                });
                await this.backend.put(key, response);
            } else {
                // IndexedDB 存储
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([this.storeName], 'readwrite');
                    const store = transaction.objectStore(this.storeName);
                    const request = store.put(blob, key);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve();
                });
            }
        }
    
        async get(key) {
            await this.ready;
            if (this.isCacheApi) {
                const response = await this.backend.match(key);
                if (!response) return null;
                return await response.blob();
            } else {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([this.storeName], 'readonly');
                    const store = transaction.objectStore(this.storeName);
                    const request = store.get(key);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve(request.result || null);
                });
            }
        }
    
        async delete(key) {
            await this.ready;
            if (this.isCacheApi) {
                await this.backend.delete(key);
            } else {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([this.storeName], 'readwrite');
                    const store = transaction.objectStore(this.storeName);
                    const request = store.delete(key);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve();
                });
            }
        }
    
        async clear() {
            await this.ready;
            if (this.isCacheApi) {
                const keys = await this.backend.keys();
                for (const key of keys) {
                    await this.backend.delete(key);
                }
            } else {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([this.storeName], 'readwrite');
                    const store = transaction.objectStore(this.storeName);
                    const request = store.clear();
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve();
                });
            }
        }
    }

    /**
     * 解压 ZIP 文件并添加其中的图片
     * @param {File} zipFile - ZIP 文件对象
     * @returns {Promise<{added: number, errors: Array}>}
     */
    async function extractZipAndAddImages(zipFile) {
        // 防御性检测：检查 fflate 是否可用
        if (typeof fflate === 'undefined') {
            console.error('fflate 未加载，ZIP 解压功能不可用');
            const statusDiv = document.getElementById('batchStatus');
            statusDiv.innerHTML = '❌ ZIP 解压功能不可用（fflate 库未加载）';
            setTimeout(() => statusDiv.innerHTML = '', 3000);
            logError(zipFile.name, 'ZIP 解压失败: fflate 库未加载');
            return { added: 0, errors: [{ name: zipFile.name, error: 'fflate 库未加载' }] };
        }
        
        const statusDiv = document.getElementById('batchStatus');
        statusDiv.innerHTML = `<div class="loading"></div> 正在解析 ZIP 文件...`;

        try {
            // 读取 ZIP 文件为 Uint8Array
            const arrayBuffer = await zipFile.arrayBuffer();
            const zipData = new Uint8Array(arrayBuffer);

            // 使用 fflate 解压
            const unzipped = await new Promise((resolve, reject) => {
                fflate.unzip(zipData, (err, data) => {
                    if (err) reject(err);
                    else resolve(data);
                });
            });

            const imageFiles = [];
            const errors = [];

            // 遍历 ZIP 中的所有文件
            for (const [filename, fileData] of Object.entries(unzipped)) {
                // 跳过目录（以 / 结尾的条目）
                if (filename.endsWith('/')) continue;

                // 检查是否为图片文件（扩展名）
                const ext = filename.split('.').pop()?.toLowerCase();
                const imageExts = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'bmp', 'tiff', 'svg'];
                if (!imageExts.includes(ext)) continue;

                // 提取文件名（去掉路径前缀）
                const baseName = filename.split('/').pop();
                if (!baseName) continue;

                try {
                    // 创建 Blob 并转换为 File 对象
                    const blob = new Blob([fileData], { type: `image/${ext === 'jpg' ? 'jpeg' : ext}` });
                    const file = new File([blob], baseName, { type: blob.type });
                    imageFiles.push(file);
                } catch (e) {
                    errors.push({ name: baseName, error: e.message });
                    logError(baseName, `ZIP 解压提取失败: ${e.message}`);
                }
            }

            if (imageFiles.length === 0) {
                statusDiv.innerHTML = '⚠️ ZIP 文件中未找到支持的图片格式';
                setTimeout(() => statusDiv.innerHTML = '', 3000);
                return { added: 0, errors };
            }

            statusDiv.innerHTML = `<div class="loading"></div> 正在添加 ${imageFiles.length} 张图片...`;

            // 逐个添加图片
            let added = 0;
            for (let i = 0; i < imageFiles.length; i++) {
                try {
                    await addImage(imageFiles[i]);
                    added++;
                    // 更新进度
                    const progress = Math.round((i + 1) / imageFiles.length * 100);
                    statusDiv.innerHTML = `正在添加图片 ${i + 1}/${imageFiles.length} (${progress}%)<div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>`;
                    await new Promise(resolve => setTimeout(resolve, 0));
                } catch (e) {
                    errors.push({ name: imageFiles[i].name, error: e.message });
                    logError(imageFiles[i].name, `添加失败: ${e.message}`);
                }
            }

            statusDiv.innerHTML = `✅ 已从 ZIP 添加 ${added} 张图片${errors.length ? `，${errors.length} 个文件失败` : ''}`;
            setTimeout(() => statusDiv.innerHTML = '', 3000);

            return { added, errors };

        } catch (error) {
            console.error('ZIP 解压失败:', error);
            statusDiv.innerHTML = `❌ ZIP 解压失败: ${error.message}`;
            setTimeout(() => statusDiv.innerHTML = '', 3000);
            logError(zipFile.name, `ZIP 解压失败: ${error.message}`);
            return { added: 0, errors: [{ name: zipFile.name, error: error.message }] };
        }
    }

    /**
     * 打包下载选中的图片为 ZIP 文件
     * @param {string} format - 保存格式：'png'|'jpg'|'bmp'|'webp'
     * @returns {Promise<void>}
     */
    async function saveImagesAsZip(format) {
        // 防御性检测：检查 fflate 是否可用
        if (typeof fflate === 'undefined') {
            console.error('fflate 未加载，ZIP 打包功能不可用');
            const statusDiv = document.getElementById('batchStatus');
            statusDiv.innerHTML = '❌ ZIP 打包功能不可用（fflate 库未加载）';
            setTimeout(() => statusDiv.innerHTML = '', 3000);
            return;
        }
        
        const targetIds = selectedImages.size > 0
            ? Array.from(selectedImages)
            : images.map(img => img.id);

        if (targetIds.length === 0) {
            const statusDiv = document.getElementById('batchStatus');
            statusDiv.innerHTML = '⚠️ 请先选择图片';
            setTimeout(() => statusDiv.innerHTML = '', 2000);
            return;
        }

        const statusDiv = document.getElementById('batchStatus');
        statusDiv.innerHTML = `<div class="loading"></div> 正在准备打包 ${targetIds.length} 张图片...`;

        // 收集所有图片 Blob 并转换为目标格式
        const filesToZip = [];
        let successCount = 0;
        let failureCount = 0;

        for (let i = 0; i < targetIds.length; i++) {
            const imageId = targetIds[i];
            const imageData = images.find(img => img.id === imageId);
            if (!imageData) {
                failureCount++;
                continue;
            }

            try {
                // 获取当前图片 Blob
                const blob = await storage.get(`current_${imageData.id}`);
                if (!blob) throw new Error('图片数据不存在');

                let outputBlob;
                const targetFormat = format.toLowerCase();
                const currentType = blob.type;
                const needConvert = !(currentType === `image/${targetFormat}` ||
                    (targetFormat === 'jpg' && currentType === 'image/jpeg') ||
                    (targetFormat === 'jpeg' && currentType === 'image/jpg'));

                if (needConvert) {
                    // 需要转换格式
                    const bitmap = await createImageBitmap(blob);
                    const canvas = getCanvasFromPool(bitmap.width, bitmap.height);
                    const ctx = canvas.getContext('2d');
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(bitmap, 0, 0);
                    bitmap.close();

                    if (targetFormat === 'png') {
                        outputBlob = await new Promise(r => canvas.toBlob(r, 'image/png'));
                    } else if (targetFormat === 'bmp') {
                        const bmpData = await canvasToBMPAsync(canvas);
                        outputBlob = new Blob([bmpData], { type: 'image/bmp' });
                    } else if (targetFormat === 'jpg' || targetFormat === 'jpeg') {
                        outputBlob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.95));
                    } else if (targetFormat === 'webp') {
                        if (!(await isWebPSupported())) throw new Error('浏览器不支持 WebP');
                        outputBlob = await new Promise(r => canvas.toBlob(r, 'image/webp', 0.95));
                    } else {
                        outputBlob = blob;
                    }
                    releaseCanvasToPool(canvas);
                } else {
                    outputBlob = blob;
                }

                // 生成文件名
                const ext = targetFormat === 'jpeg' ? 'jpg' : targetFormat;
                const fileName = `${imageData.name.replace(/\.[^/.]+$/, '')}_${imageData.status}.${ext}`;

                // 读取为 Uint8Array 供 fflate 使用
                const arrayBuffer = await outputBlob.arrayBuffer();
                filesToZip.push({
                    name: fileName,
                    data: new Uint8Array(arrayBuffer)
                });
                successCount++;

                // 更新进度
                const progress = Math.round((i + 1) / targetIds.length * 100);
                statusDiv.innerHTML = `正在处理 ${i + 1}/${targetIds.length} (${progress}%)<div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>`;
                await new Promise(resolve => setTimeout(resolve, 0));

            } catch (error) {
                console.error(`打包图片失败: ${imageData.name}`, error);
                failureCount++;
                logError(imageData.name, `打包失败: ${error.message || '未知错误'}`);
            }
        }

        if (successCount === 0) {
            statusDiv.innerHTML = `❌ 打包失败，没有可用的图片`;
            setTimeout(() => statusDiv.innerHTML = '', 3000);
            return;
        }

        // 使用 fflate 创建 ZIP
        statusDiv.innerHTML = `<div class="loading"></div> 正在创建 ZIP 文件...`;
        await new Promise(resolve => setTimeout(resolve, 10));

        try {
            // 构建 zip 数据对象
            const zipObj = {};
            for (const file of filesToZip) {
                zipObj[file.name] = file.data;
            }

            // 压缩为 ZIP
            const zipData = await new Promise((resolve, reject) => {
                fflate.zip(zipObj, (err, data) => {
                    if (err) reject(err);
                    else resolve(data);
                });
            });

            // 下载 ZIP 文件
            const zipBlob = new Blob([zipData], { type: 'application/zip' });
            const url = URL.createObjectURL(zipBlob);
            const a = document.createElement('a');
            const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
            a.download = `混淆图片_${timestamp}.zip`;
            a.href = url;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 100);

            statusDiv.innerHTML = `✅ 打包完成，已下载 ${successCount} 张图片${failureCount ? `，${failureCount} 张失败` : ''}`;
            setTimeout(() => statusDiv.innerHTML = '', 3000);

        } catch (error) {
            console.error('ZIP 创建失败:', error);
            statusDiv.innerHTML = `❌ ZIP 创建失败: ${error.message}`;
            setTimeout(() => statusDiv.innerHTML = '', 3000);
            logError('ZIP打包', `创建失败: ${error.message}`);
        }
    }

    /**

     * 统一由ErrorLogManager管理日志数据，只负责UI更新
     */
    function logError(fileName, reason, metadata = {}) {
        const errorLogPanel = document.getElementById('errorLogPanel');
        const errorLogContent = document.getElementById('errorLogContent');

        // 统一由ErrorLogManager管理日志数据
        const logEntry = ErrorLogManager.add(fileName, reason, metadata);

        // 显示错误日志面板

        // 创建错误日志项（使用HTML转义防止XSS）
        const errorItem = document.createElement('div');
        errorItem.className = 'error-log-item';
        errorItem.dataset.logId = logEntry.id; // 关联日志ID便于管理
        errorItem.innerHTML = `<span class="error-timestamp">[${logEntry.formattedTime}]</span> <span class="error-file-name">${logEntry.fileName}</span><span class="error-reason"> - ${logEntry.reason}</span>`;
        
        // 添加鼠标悬停效果（可选）
        errorItem.style.cursor = 'default';
        errorItem.onmouseover = function() {
            this.style.backgroundColor = '#fff0f0';
        };
        errorItem.onmouseout = function() {
            this.style.backgroundColor = '';
        };
        
        // 添加到错误日志内容顶部
        if (errorLogContent.firstChild) {
            errorLogContent.insertBefore(errorItem, errorLogContent.firstChild);
        } else {
            errorLogContent.appendChild(errorItem);
        }
        
        // 限制最多显示 100 条错误日志，超出时自动移除最早的条目
        const MAX_ERROR_LOGS = 100;
        const errorItems = errorLogContent.querySelectorAll('.error-log-item');
        if (errorItems.length > MAX_ERROR_LOGS) {
            // 移除最旧的条目（位于末尾）
            const oldestItem = errorItems[errorItems.length - 1];
            if (oldestItem && oldestItem.parentNode) {
                // 通过 ErrorLogManager.remove() 方法统一清理数据和 DOM，保持数据一致性
                const logId = oldestItem.dataset.logId;
                ErrorLogManager.remove(logId);
                // 从 DOM 中移除对应的元素
                oldestItem.parentNode.removeChild(oldestItem);
                console.log(`🗑️ 已从 UI 层移除最旧错误日志：${logId}`);
            }
        }
        
        console.log(`📝 错误已记录: ${fileName} - ${reason}`);
    }

    /**
     * 错误日志管理器

     */
    const ErrorLogManager = {
        /**
         * 添加错误日志
         * @param {string} fileName - 文件名
         * @param {string} reason - 错误原因
         * @param {Object} [metadata] - 可选的元数据
         */
        add(fileName, reason, metadata = {}) {
            const timestamp = new Date();
            const logEntry = {
                id: Date.now().toString(36) + Math.random().toString(36).substring(2),
                fileName: escapeHtml(fileName),
                reason: escapeHtml(reason),
                timestamp,
                formattedTime: timestamp.toLocaleString('zh-CN', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                }),
                metadata: metadata,
                // 未来可能添加的字段：
                // blobUrl: null,  // 如果需要存储图片预览
                // previewData: null  // 预览数据
            };
            
            errorLogs.push(logEntry);
            
            // 限制最大的日志数量，防止内存泄漏
            const MAX_LOGS = 100;
            if (errorLogs.length > MAX_LOGS) {
                const removedLogs = errorLogs.splice(0, errorLogs.length - MAX_LOGS);
                // 清理被移除日志的资源
                this.cleanupLogs(removedLogs);
                console.log(`🗑️ 已从数据层清理${removedLogs.length}条错误日志`);
            }
            
            return logEntry;
        },
        
        /**
         * 获取所有错误日志
         * @returns {Array<Object>} 错误日志数组
         */
        getAll() {
            return [...errorLogs];
        },
        
        /**
         * 清理错误日志
         * @param {Array<Object>} [logs] - 要清理的日志数组，如果不提供则清理所有日志
         */
        cleanupLogs(logs = errorLogs) {
            logs.forEach(log => {
                // 通用Blob URL清理：遍历metadata中所有以blob:开头的字符串
                if (log.metadata) {
                    Object.keys(log.metadata).forEach(key => {
                        const value = log.metadata[key];
                        // 检查是否为blob URL字符串
                        if (typeof value === 'string' && value.startsWith('blob:')) {
                            try {
                                URL.revokeObjectURL(value);
                                console.log(`已释放错误日志中的Blob URL [${key}]:`, value);
                            } catch (error) {
                                console.warn(`释放Blob URL [${key}] 失败:`, error);
                            }
                            // 删除已释放的引用
                            delete log.metadata[key];
                        }
                    });
                }
            });
        },
        
        /**
         * 移除错误日志
         * @param {string} logId - 要移除的日志 ID
         * @returns {boolean} 是否成功移除
         */
        remove(logId) {
            const index = errorLogs.findIndex(log => log.id === logId);
            if (index !== -1) {
                const removedLog = errorLogs.splice(index, 1)[0];
                // 清理被移除日志的资源
                this.cleanupLogs([removedLog]);
                return true;
            }
            return false;
        },
        
        /**
         * 清空所有错误日志
         */
        clear() {
            // 先清理资源
            this.cleanupLogs();
            // 再清空数组
            errorLogs = [];
            console.log('✅ 错误日志数据已清空并释放相关资源');
        }
    };
    
    // =============================================
    // 希尔伯特曲线算法
    // =============================================

    /**
     * 生成二维希尔伯特曲线坐标序列
     * @param {number} width - 图片宽度
     * @param {number} height - 图片高度
     * @returns {Array} 坐标数组，每个元素为[x, y]
     *
     * 希尔伯特曲线是一种空间填充曲线，能够保持像素的空间相关性
     * 通过黄金分割比例计算偏移量实现混淆效果
     */
    // =============================================
    // 希尔伯特曲线缓存（LRU淘汰策略）
    // =============================================
    
    // 希尔伯特曲线缓存 - 基于访问频率的LFU策略
    const curveCache = new Map(); // key -> {data: Uint32Array, frequency: number, lastAccess: number}
    const MAX_CACHE_SIZE = 20;
    let accessCounter = 0; // 全局访问计数器，用于记录访问时间
    
    function getCachedCurve(width, height) {
        const key = `${width}x${height}`;
        accessCounter++;
        
        if (curveCache.has(key)) {
            // 命中缓存：增加访问频率并更新最后访问时间
            const cacheEntry = curveCache.get(key);
            cacheEntry.frequency++;
            cacheEntry.lastAccess = accessCounter;
            return cacheEntry.data;
        }
        
        // 未命中：生成新的曲线数据
        const curve = gilbert2d(width, height);
        
        // 检查是否需要淘汰
        if (curveCache.size >= MAX_CACHE_SIZE) {
            evictLFUCacheEntry();
        }
        
        // 添加新条目
        curveCache.set(key, {
            data: curve,
            frequency: 1,
            lastAccess: accessCounter
        });
        
        return curve;
    }
    
    // LFU淘汰策略：淘汰访问频率最低的条目，频率相同时淘汰最久未访问的
    function evictLFUCacheEntry() {
        let minFreq = Infinity;
        let oldestAccess = Infinity;
        let evictionKey = null;
        
        // 找到访问频率最低且最久未访问的条目
        for (const [key, entry] of curveCache.entries()) {
            if (entry.frequency < minFreq || 
                (entry.frequency === minFreq && entry.lastAccess < oldestAccess)) {
                minFreq = entry.frequency;
                oldestAccess = entry.lastAccess;
                evictionKey = key;
            }
        }
        
        if (evictionKey !== null) {
            curveCache.delete(evictionKey);
            console.log(`LFU缓存淘汰: ${evictionKey} (频率: ${minFreq}, 最后访问: ${oldestAccess})`);
        }
    }
    
    function gilbert2d(width, height) {
        const totalPixels = width * height;
        const indices = new Uint32Array(totalPixels);
        let idx = 0;

        function generate2d(x, y, ax, ay, bx, by) {
            const w = Math.abs(ax + ay);
            const h = Math.abs(bx + by);
            const dax = Math.sign(ax), day = Math.sign(ay);
            const dbx = Math.sign(bx), dby = Math.sign(by);

            if (h === 1) {
                for (let i = 0; i < w; i++) {
                    indices[idx++] = y * width + x;  // 直接存储线性索引
                    x += dax;
                    y += day;
                }
                return;
            }
            if (w === 1) {
                for (let i = 0; i < h; i++) {
                    indices[idx++] = y * width + x;  // 直接存储线性索引
                    x += dbx;
                    y += dby;
                }
                return;
            }

            let ax2 = Math.floor(ax / 2), ay2 = Math.floor(ay / 2);
            let bx2 = Math.floor(bx / 2), by2 = Math.floor(by / 2);
            const w2 = Math.abs(ax2 + ay2);
            const h2 = Math.abs(bx2 + by2);

            if (2 * w > 3 * h) {
                if ((w2 % 2) && (w > 2)) {
                    ax2 += dax;
                    ay2 += day;
                }
                generate2d(x, y, ax2, ay2, bx, by);
                generate2d(x + ax2, y + ay2, ax - ax2, ay - ay2, bx, by);
            } else {
                if ((h2 % 2) && (h > 2)) {
                    bx2 += dbx;
                    by2 += dby;
                }
                generate2d(x, y, bx2, by2, ax2, ay2);
                generate2d(x + bx2, y + by2, ax, ay, bx - bx2, by - by2);
                generate2d(x + (ax - dax) + (bx2 - dbx), y + (ay - day) + (by2 - dby),
                           -bx2, -by2, -(ax - ax2), -(ay - ay2));
            }
        }

        if (width >= height) {
            generate2d(0, 0, width, 0, 0, height);
        } else {
            generate2d(0, 0, 0, height, width, 0);
        }
        return indices;
    }

    // =============================================
    // 像素缓冲区池管理
    // =============================================
    
    const pixelBufferPool = [];
    
    function getPixelBuffer(size) {
        // 遍历池，找到第一个长度完全相等的缓冲区
        for (let i = 0; i < pixelBufferPool.length; i++) {
            if (pixelBufferPool[i].length === size) {
                return pixelBufferPool.splice(i, 1)[0];
            }
        }
        // 未找到则新建
        return new Uint8ClampedArray(size);
    }
    
    function releasePixelBuffer(buffer) {
        const MAX_POOL_SIZE = 5;          // 限制池大小，避免无限增长
        if (pixelBufferPool.length >= MAX_POOL_SIZE) {
            return; // 丢弃，等待GC
        }
        pixelBufferPool.push(buffer);
    }
    
    // =============================================
    // Canvas池管理函数（按尺寸分组）
    // =============================================
    
    /**
     * 按尺寸分组的Canvas池
     * key: "width×height", value: HTMLCanvasElement[]
     * @type {Map<string, HTMLCanvasElement[]>}
     */
    const canvasPoolBySize = new Map();
    
    /**
     * 从Canvas池获取指定尺寸的Canvas对象
     * @param {number} width - 所需Canvas宽度
     * @param {number} height - 所需Canvas高度
     * @returns {HTMLCanvasElement} Canvas对象
     * 
     * 按尺寸精确匹配，减少重复设置宽高的开销
     * 池为空时创建新对象并设置对应尺寸
     */
    function getCanvasFromPool(width, height) {
        const key = `${width}x${height}`;
        let pool = canvasPoolBySize.get(key);
        
        if (!pool) {
            pool = [];
            canvasPoolBySize.set(key, pool);
        }
        
        if (pool.length > 0) {
            return pool.pop();
        }
        
        // 池为空时创建新Canvas并设置尺寸
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        return canvas;
    }
    
    /**
     * 将Canvas对象按尺寸放回对应的池中
     * @param {HTMLCanvasElement} canvas - 要回收的Canvas对象
     * 
     * 按Canvas的实际尺寸进行分组存储
     * 每个尺寸组限制最大容量为5个对象
     */
    function releaseCanvasToPool(canvas) {
        // 使用Canvas的实际尺寸作为键
        const key = `${canvas.width}x${canvas.height}`;
        
        // 确保该尺寸组存在
        if (!canvasPoolBySize.has(key)) {
            canvasPoolBySize.set(key, []);
        }
        
        const pool = canvasPoolBySize.get(key);
        
        // 限制每个尺寸组的最大容量为5个Canvas对象
        if (pool.length < 5) {
            pool.push(canvas);
        }
        // 超过容量限制的对象会被垃圾回收
    }
    
    /**
     * 智能清理Canvas池
     * 保留部分常用尺寸的Canvas，避免频繁重建影响性能
     */
    function smartClearCanvasPools() {
        const COMMON_SIZES = [
            '256x256',   // 常见小图
            '512x512',   // 中等尺寸
            '1024x1024', // 常见大图
            '1920x1080', // 1080p
            '3840x2160'  // 4K
        ];
        
        const RETAIN_COUNT_PER_SIZE = 2; // 每个尺寸保留2个Canvas
        
        canvasPoolBySize.forEach((pool, key) => {
            if (COMMON_SIZES.includes(key)) {
                // 对于常用尺寸，保留部分Canvas
                if (pool.length > RETAIN_COUNT_PER_SIZE) {
                    const canvasesToKeep = pool.slice(0, RETAIN_COUNT_PER_SIZE);
                    const canvasesToClear = pool.slice(RETAIN_COUNT_PER_SIZE);
                    
                    // 清理多余的Canvas
                    canvasesToClear.forEach(canvas => {
                        canvas.width = 0;
                        canvas.height = 0;
                    });
                    
                    // 保留指定数量的Canvas
                    pool.length = 0;
                    pool.push(...canvasesToKeep);
                    console.log(`保留常用尺寸 ${key}: ${canvasesToKeep.length} 个Canvas`);
                }
            } else {
                // 非常用尺寸完全清理
                pool.forEach(canvas => {
                    canvas.width = 0;
                    canvas.height = 0;
                });
                pool.length = 0;
                console.log(`清理非常用尺寸 ${key}: ${pool.length} 个Canvas`);
            }
        });
        
        // 清理完全空的池
        for (const [key, pool] of canvasPoolBySize.entries()) {
            if (pool.length === 0) {
                canvasPoolBySize.delete(key);
            }
        }
        
        console.log('智能清理完成，保留了常用尺寸的Canvas');
    }
    
    /**
     * 预创建常用尺寸的Canvas
     * 在页面重新可见时提前创建可能需要的Canvas
     */
    function preCreateCommonCanvases() {
        const COMMON_SIZES = [
            { width: 256, height: 256 },
            { width: 512, height: 512 },
            { width: 1024, height: 1024 },
            { width: 1920, height: 1080 }
        ];
        
        COMMON_SIZES.forEach(size => {
            const key = `${size.width}x${size.height}`;
            let pool = canvasPoolBySize.get(key);
            
            if (!pool) {
                pool = [];
                canvasPoolBySize.set(key, pool);
            }
            
            // 确保每个常用尺寸至少有2个Canvas
            while (pool.length < 2) {
                const canvas = document.createElement('canvas');
                canvas.width = size.width;
                canvas.height = size.height;
                pool.push(canvas);
            }
        });
        
        console.log('预创建常用Canvas完成');
    }
    
    /**
     * 清理所有Canvas池中的对象
     * 
     * 在页面卸载时调用，完全释放所有Canvas资源
     */
    function clearAllCanvasPools() {
        canvasPoolBySize.forEach((pool, key) => {
            pool.forEach(canvas => {
                // 重置尺寸以帮助垃圾回收
                canvas.width = 0;
                canvas.height = 0;
            });
            pool.length = 0;
        });
        canvasPoolBySize.clear();
        console.log('已清理所有Canvas池');
    }
    

    
    // =============================================
    // 图片格式转换函数
    // =============================================

    /**
     * 将Canvas转换为BMP格式的二进制数据（优化版本）
     * @param {HTMLCanvasElement} canvas - 要转换的Canvas元素
     * @returns {ArrayBuffer} BMP格式的二进制数据
     *
     * 优化点：
     * 1. 使用Uint8Array直接填充文件头，减少DataView开销
     * 2. 预计算行对齐参数，避免循环中重复计算
     * 3. 对大图(>2MB)可考虑使用Web Worker处理
     */
    function canvasToBMP(canvas) {
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        const imageData = ctx.getImageData(0, 0, width, height);

        // 预计算行对齐参数（避免在循环中重复计算）
        const bytesPerPixel = 3; // 24位BMP不包含Alpha通道
        const rowPadding = (4 - (width * bytesPerPixel) % 4) % 4; // 4字节对齐padding
        const rowSize = width * bytesPerPixel + rowPadding;
        const pixelDataSize = rowSize * height;
        const totalSize = 54 + pixelDataSize; // 14(文件头) + 40(信息头) + 像素数据
        
        // 使用Uint8Array直接填充文件头（性能优于DataView）
        const result = new Uint8Array(totalSize);
        
        // BMP文件头 (14字节)
        result[0] = 0x42;  // 'B'
        result[1] = 0x4D;  // 'M'
        // 文件大小 (little-endian)
        result[2] = totalSize & 0xFF;
        result[3] = (totalSize >> 8) & 0xFF;
        result[4] = (totalSize >> 16) & 0xFF;
        result[5] = (totalSize >> 24) & 0xFF;
        // 保留字段 (6-9字节为0)
        result[10] = 54 & 0xFF;  // 像素数据偏移量低位
        result[11] = (54 >> 8) & 0xFF;  // 像素数据偏移量高位
        
        // BMP信息头 (40字节)
        result[14] = 40;  // 信息头大小
        // 图片宽度 (little-endian)
        result[18] = width & 0xFF;
        result[19] = (width >> 8) & 0xFF;
        result[20] = (width >> 16) & 0xFF;
        result[21] = (width >> 24) & 0xFF;
        // 图片高度 (负数表示从上到下存储)
        const negativeHeight = -height;
        result[22] = negativeHeight & 0xFF;
        result[23] = (negativeHeight >> 8) & 0xFF;
        result[24] = (negativeHeight >> 16) & 0xFF;
        result[25] = (negativeHeight >> 24) & 0xFF;
        result[26] = 1;  // 颜色平面数
        result[28] = 24; // 每像素位数(24位)
        // 像素数据大小
        result[34] = pixelDataSize & 0xFF;
        result[35] = (pixelDataSize >> 8) & 0xFF;
        result[36] = (pixelDataSize >> 16) & 0xFF;
        result[37] = (pixelDataSize >> 24) & 0xFF;
        // 分辨率 (2835 pixels/meter ≈ 72 DPI)
        result[38] = 47; result[39] = 11;  // 水平分辨率低位
        result[42] = 47; result[43] = 11;  // 垂直分辨率低位
        
        // 转换像素数据：RGBA -> BGR（优化的循环）
        const srcData = imageData.data;
        let srcIndex = 0;
        let dstIndex = 54; // 从文件头后开始写入
        
        for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
                // BGR顺序写入（跳过Alpha通道）
                result[dstIndex++] = srcData[srcIndex + 2];  // B
                result[dstIndex++] = srcData[srcIndex + 1];  // G
                result[dstIndex++] = srcData[srcIndex];      // R
                srcIndex += 4; // 跳过Alpha通道
            }
            // 添加行padding（已由Uint8Array初始化为0）
            dstIndex += rowPadding;
        }

        return result.buffer;
    }
    
    /**
     * 异步BMP生成函数（用于大图处理）
     * @param {HTMLCanvasElement} canvas - 要转换的Canvas元素
     * @returns {Promise<ArrayBuffer>} BMP格式的二进制数据
     * 
     * 对于大图(>2MB)使用Web Worker避免主线程阻塞
     */
    async function canvasToBMPAsync(canvas) {
        const dataSize = canvas.width * canvas.height * 4;
        
        // 小图直接同步处理
        if (dataSize <= 2 * 1024 * 1024) {  // 2MB阈值
            return canvasToBMP(canvas);
        }
        
        // 大图使用Web Worker处理
        return new Promise((resolve, reject) => {
            try {
                // 创建内联Worker处理大图
                const workerCode = `
                    self.onmessage = function(e) {
                        const { width, height, imageData } = e.data;
                        
                        // 预计算参数
                        const bytesPerPixel = 3;
                        const rowPadding = (4 - (width * bytesPerPixel) % 4) % 4;
                        const rowSize = width * bytesPerPixel + rowPadding;
                        const pixelDataSize = rowSize * height;
                        const totalSize = 54 + pixelDataSize;
                        
                        const result = new Uint8Array(totalSize);
                        
                        // 文件头
                        result[0] = 0x42; result[1] = 0x4D;
                        result[2] = totalSize & 0xFF;
                        result[3] = (totalSize >> 8) & 0xFF;
                        result[4] = (totalSize >> 16) & 0xFF;
                        result[5] = (totalSize >> 24) & 0xFF;
                        result[10] = 54 & 0xFF;
                        result[11] = (54 >> 8) & 0xFF;
                        
                        // 信息头
                        result[14] = 40;
                        result[18] = width & 0xFF;
                        result[19] = (width >> 8) & 0xFF;
                        result[20] = (width >> 16) & 0xFF;
                        result[21] = (width >> 24) & 0xFF;
                        
                        const negativeHeight = -height;
                        result[22] = negativeHeight & 0xFF;
                        result[23] = (negativeHeight >> 8) & 0xFF;
                        result[24] = (negativeHeight >> 16) & 0xFF;
                        result[25] = (negativeHeight >> 24) & 0xFF;
                        
                        result[26] = 1; result[28] = 24;
                        result[34] = pixelDataSize & 0xFF;
                        result[35] = (pixelDataSize >> 8) & 0xFF;
                        result[36] = (pixelDataSize >> 16) & 0xFF;
                        result[37] = (pixelDataSize >> 24) & 0xFF;
                        result[38] = 47; result[39] = 11;
                        result[42] = 47; result[43] = 11;
                        
                        // 像素数据转换
                        let srcIndex = 0;
                        let dstIndex = 54;
                        
                        for (let y = 0; y < height; y++) {
                            for (let x = 0; x < width; x++) {
                                result[dstIndex++] = imageData[srcIndex + 2];
                                result[dstIndex++] = imageData[srcIndex + 1];
                                result[dstIndex++] = imageData[srcIndex];
                                srcIndex += 4;
                            }
                            dstIndex += rowPadding;
                        }
                        
                        self.postMessage(result.buffer, [result.buffer]);
                        self.close();
                    };
                `;
                
                const blob = new Blob([workerCode], { type: 'application/javascript' });
                const blobUrl = URL.createObjectURL(blob);
                const worker = new Worker(blobUrl);
                
                worker.onmessage = function(e) {
                    URL.revokeObjectURL(blobUrl); // 释放Web Worker的blob URL
                    resolve(e.data);
                };
                
                worker.onerror = function(error) {
                    URL.revokeObjectURL(blobUrl); // 释放Web Worker的blob URL
                    reject(new Error(`Web Worker处理失败: ${error.message}`));
                };
                
                // 确保Worker终止时也能释放资源
                worker.addEventListener('messageerror', function() {
                    URL.revokeObjectURL(blobUrl);
                });
                
                const ctx = canvas.getContext('2d');
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                
                worker.postMessage({
                    width: canvas.width,
                    height: canvas.height,
                    imageData: imageData.data
                }, [imageData.data.buffer]);
                
            } catch (error) {
                // Web Worker不可用时回退到同步处理
                console.warn('Web Worker不可用，回退到同步处理:', error);
                resolve(canvasToBMP(canvas));
            }
        });
    }

    // =============================================
    // 图片处理核心函数
    // =============================================
    /**
     * 处理单张图片
     * @param {Object} imageData - 图片数据对象
     * @param {string} operation - 操作类型：'encrypt'|'decrypt'|'restore'
     * @returns {Promise} 处理完成的 Promise
     *
     * 使用希尔伯特曲线算法对图片像素进行空间重排
     * 通过黄金分割比例计算偏移量实现混淆效果
     */
    async function processSingleImage(imageData, operation) {
        // 获取当前图片 Blob (如果是 restore，直接使用原始图片)
        let sourceBlob;
        if (operation === 'restore') {
            sourceBlob = await storage.get(`original_${imageData.id}`);
        } else {
            sourceBlob = await storage.get(`current_${imageData.id}`);
        }
        if (!sourceBlob) throw new Error('图片数据不存在');

        // 通过 ImageBitmap 加载到 canvas
        const bitmap = await createImageBitmap(sourceBlob);
        const canvas = getCanvasFromPool(bitmap.width, bitmap.height);
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        // 清除旧内容，避免透明图层残留
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(bitmap, 0, 0);
        bitmap.close();

        // 获取像素数据
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const totalPixels = canvas.width * canvas.height;
        const curve = getCachedCurve(canvas.width, canvas.height);
        const offset = Math.round((Math.sqrt(5) - 1) / 2 * totalPixels);
        const dstBuffer = getPixelBuffer(imgData.data.length);
        const srcU32 = new Uint32Array(imgData.data.buffer);
        const dstU32 = new Uint32Array(dstBuffer.buffer);

        if (operation === 'encrypt') {
            for (let i = 0; i < totalPixels; i++) {
                const oldIdx = curve[i];
                const newIdx = curve[(i + offset) % totalPixels];
                dstU32[newIdx] = srcU32[oldIdx];
            }
            imageData.status = 'encrypted';
        } else if (operation === 'decrypt') {
            for (let i = 0; i < totalPixels; i++) {
                const oldIdx = curve[i];
                const newIdx = curve[(i + offset) % totalPixels];
                dstU32[oldIdx] = srcU32[newIdx];
            }
            imageData.status = 'decrypted';
        } else if (operation === 'restore') {
            dstBuffer.set(imgData.data);
            imageData.status = 'original';
        }

        // 写回 canvas
        const newImageData = new ImageData(dstBuffer, canvas.width, canvas.height);
        ctx.putImageData(newImageData, 0, 0);
        releasePixelBuffer(dstBuffer);

        // 生成新 Blob (PNG 格式存储)
        const newBlob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
        // 存储当前图片
        await storage.set(`current_${imageData.id}`, newBlob);
        
        // 更新图片元数据（不修改尺寸，只更新格式和状态）
        imageData.format = 'PNG';
        imageData.processed = true;
        imageData.size = newBlob.size; // 更新文件大小
        
        // 更新预览
        await updateThumbnail(imageData.id, newBlob);
        // 更新界面显示
        updateImageInfo(imageData.id);

        // 释放 canvas
        releaseCanvasToPool(canvas);
    }

    /**
     * 更新缩略图显示
     * @param {string} imageId - 图片 ID
     * @param {Blob} blob - 图片 Blob 对象
     *
     * 使用 ImageBitmap 将 Blob 绘制到 canvas 缩略图
     */
    async function updateThumbnail(imageId, blob) {
        const item = document.querySelector(`[data-id="${imageId}"]`);
        if (!item) return;
        const canvas = item.querySelector('.thumbnail-canvas');
        if (canvas) {
            try {
                const bitmap = await createImageBitmap(blob);
                canvas.width = bitmap.width;
                canvas.height = bitmap.height;
                const ctx = canvas.getContext('2d');
                // 清除旧内容，避免透明图层残留
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(bitmap, 0, 0);
                bitmap.close();
                    
                // 只更新界面显示，不修改元数据中的尺寸（保持首次获取的尺寸不变）
                updateImageInfo(imageId);
            } catch (e) {
                console.warn('更新缩略图失败', e);
            }
        }
    }

    // =============================================
    // 批量操作函数
    // =============================================

    /**
     * 批量处理图片（混淆/解混淆/还原）
     * @param {string} operation - 操作类型：'encrypt'|'decrypt'|'restore'
     *
     * 支持选择特定图片或处理所有图片
     * 显示进度条和状态信息
     */
    async function processBatch(operation) {
        if (isProcessing) return;

        // 确定目标图片ID：优先使用选中的图片，否则处理所有图片
        const targetIds = selectedImages.size > 0
            ? Array.from(selectedImages)
            : images.map(img => img.id);

        if (targetIds.length === 0) {
            const statusDiv = document.getElementById('batchStatus');
            statusDiv.innerHTML = '⚠️ 请先选择图片';
            setTimeout(() => statusDiv.innerHTML = '', 2000);
            return;
        }

        isProcessing = true;
        const statusDiv = document.getElementById('batchStatus');
        statusDiv.innerHTML = `<div class="loading"></div> 正在处理 ${targetIds.length} 张图片...`;

        // 统计成功和失败数量
        let successCount = 0;
        let failureCount = 0;
        
        try {
            for (let i = 0; i < targetIds.length; i++) {
                const imageId = targetIds[i];
                const imageData = images.find(img => img.id === imageId);
                if (imageData) {
                    // 显示处理中遮罩，提供视觉反馈
                    const item = document.querySelector(`[data-id="${imageId}"]`);
                    let overlay = null;
                    if (item) {
                        overlay = document.createElement('div');
                        overlay.className = 'processing-overlay';
                        overlay.innerHTML = '<div class="loading"></div>';
                        item.querySelector('.thumbnail-container').appendChild(overlay);
                    }

                    try {
                        await processSingleImage(imageData, operation);
                        successCount++;
                    } catch (error) {
                        console.error(`处理图片失败: ${imageData.name}`, error);
                        failureCount++;
                        // 记录错误到日志
                        if (typeof logError !== 'undefined') {
                            logError(imageData.name, `处理失败: ${error.message || '未知错误'}`);
                        }
                    } finally {
                        // 简化遮罩清理：直接移除overlay（如果存在）
                        overlay?.remove();
                    }

                    // 更新进度显示
                    const progress = Math.round((i + 1) / targetIds.length * 100);
                    statusDiv.innerHTML = `
                    正在处理 ${i + 1}/${targetIds.length} 张图片 (${progress}%)
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${progress}%"></div>
                    </div>
                `;

                    // 让出控制权，避免阻塞UI
                    await new Promise(resolve => setTimeout(resolve, 0));
                }
            }

            // 根据成功和失败数量显示不同状态
            if (failureCount === 0) {
                statusDiv.innerHTML = `✅ 全部处理成功 (${successCount} 张)`;
            } else if (successCount === 0) {
                statusDiv.innerHTML = `❌ 全部处理失败 (${failureCount} 张)`;
            } else {
                statusDiv.innerHTML = `✅ 成功 ${successCount} 张，❌ 失败 ${failureCount} 张`;
            }
            setTimeout(() => statusDiv.innerHTML = '', 3000);
        } catch (error) {
            console.error('批量处理失败:', error);
            statusDiv.innerHTML = '❌ 处理失败';
            setTimeout(() => statusDiv.innerHTML = '', 2000);
        } finally {
            isProcessing = false;
        }
    }

    /**
     * 保存图片到本地
     * @param {string} format - 保存格式：'png'|'bmp'
     *
     * 支持PNG和BMP两种格式
     * 自动处理文件名和状态信息
     */
    /**
     * 保存图片到本地
     * 支持选择特定图片或处理所有图片
     * 使用公共函数saveImageInFormat进行实际的图片保存操作
     * @param {string} format - 保存格式：'png'|'bmp'|'jpg'|'jpeg'|'webp'
     * @returns {Promise<void>} 无返回值的Promise
     */
    async function saveImages(format) {
        // 检查打包下载开关状态
        const zipToggle = document.getElementById('zip-download-toggle');
        const useZip = zipToggle ? zipToggle.checked : false;
        
        if (useZip) {
            // 使用 ZIP 打包下载
            await saveImagesAsZip(format);
        } else {
            // 原有的逐个下载逻辑
            const targetIds = selectedImages.size > 0
                ? Array.from(selectedImages)
                : images.map(img => img.id);

            if (targetIds.length === 0) {
                const statusDiv = document.getElementById('batchStatus');
                statusDiv.innerHTML = '️ 请先选择图片';
                setTimeout(() => statusDiv.innerHTML = '', 2000);
                return;
            }

            let successCount = 0;
            let failureCount = 0;
            
            const statusDiv = document.getElementById('batchStatus');
            statusDiv.innerHTML = `<div class="loading"></div> 正在保存 ${targetIds.length} 张图片...`;

            try {
                for (let i = 0; i < targetIds.length; i++) {
                    const imageId = targetIds[i];
                    const imageData = images.find(img => img.id === imageId);
                    if (!imageData) {
                        failureCount++;
                        continue;
                    }

                    try {
                        await saveImageInFormat(imageData, format);
                        successCount++;
                    } catch (error) {
                        console.error(`保存图片失败: ${imageData.name}`, error);
                        failureCount++;
                        logError(imageData.name, `保存失败: ${error.message || '未知错误'}`);
                    }

                    // 更新进度
                    const progress = Math.round((i + 1) / targetIds.length * 100);
                    statusDiv.innerHTML = `正在保存 ${i + 1}/${targetIds.length} (${progress}%)<div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>`;
                    await new Promise(resolve => setTimeout(resolve, 50));
                }

                if (failureCount === 0) {
                    statusDiv.innerHTML = ` 全部保存成功 (${successCount} 张)`;
                } else if (successCount === 0) {
                    statusDiv.innerHTML = ` 全部保存失败 (${failureCount} 张)`;
                } else {
                    statusDiv.innerHTML = ` 成功 ${successCount} 张， 失败 ${failureCount} 张`;
                }
                setTimeout(() => statusDiv.innerHTML = '', 3000);
            } catch (error) {
                console.error('保存失败:', error);
                statusDiv.innerHTML = ' 保存失败';
                setTimeout(() => statusDiv.innerHTML = '', 2000);
            }
        }
    }

    /**
     * 保存图片到本地（公共函数）
     */
    async function saveImageInFormat(imageData, format) {
        const blob = await storage.get(`current_${imageData.id}`);
        if (!blob) throw new Error('图片数据不存在');

        // 如果格式已经是目标格式，直接下载
        const targetFormat = format.toLowerCase();
        const currentType = blob.type;
        const isSame = (currentType === `image/${targetFormat}`) ||
                       (targetFormat === 'jpg' && currentType === 'image/jpeg') ||
                       (targetFormat === 'jpeg' && currentType === 'image/jpg');
        if (isSame) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.download = `${imageData.name.replace(/\.[^/.]+$/, '')}_${imageData.status}.${targetFormat === 'jpeg' ? 'jpg' : targetFormat}`;
            a.href = url;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 100);
            return;
        }

        // 需要转换格式
        const bitmap = await createImageBitmap(blob);
        const canvas = getCanvasFromPool(bitmap.width, bitmap.height);
        const ctx = canvas.getContext('2d');
        // 清除旧内容，避免导出多余内容
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(bitmap, 0, 0);
        bitmap.close();

        let outputBlob;
        if (format === 'png') {
            outputBlob = await new Promise(r => canvas.toBlob(r, 'image/png'));
        } else if (format === 'bmp') {
            const bmpData = await canvasToBMPAsync(canvas);
            outputBlob = new Blob([bmpData], { type: 'image/bmp' });
        } else if (format === 'jpg' || format === 'jpeg') {
            outputBlob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 1.0));
        } else if (format === 'webp') {
            if (!(await isWebPSupported())) throw new Error('浏览器不支持 WebP');
            outputBlob = await new Promise(r => canvas.toBlob(r, 'image/webp', 1.0));
        } else {
            outputBlob = blob;
        }

        const url = URL.createObjectURL(outputBlob);
        const a = document.createElement('a');
        const ext = format === 'jpeg' ? 'jpg' : format;
        a.download = `${imageData.name.replace(/\.[^/.]+$/, '')}_${imageData.status}.${ext}`;
        a.href = url;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 100);
        releaseCanvasToPool(canvas);
    }

    /**
     * 添加图片到应用
     * @param {File} file - 图片文件对象
     */
    async function addImage(file) {
        const id = Date.now().toString(36) + Math.random().toString(36).substring(2);
        let blob;
        let originalFormat = file.type.split('/')[1]?.toUpperCase() || 'UNKNOWN';
        try {
            // 优先使用 arrayBuffer
            const buffer = await file.arrayBuffer();
            blob = new Blob([buffer], { type: file.type });
        } catch (firstError) {
            console.warn(`arrayBuffer 读取失败，尝试 FileReader: ${file.name}`, firstError);
            try {
                // 回退到 FileReader
                const buffer = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = () => reject(reader.error);
                    reader.readAsArrayBuffer(file);
                });
                blob = new Blob([buffer], { type: file.type });
            } catch (secondError) {
                console.warn(`FileReader 读取也失败，尝试 createImageBitmap 直接获取图像：${file.name}`, secondError);
                try {
                    // 最终回退：尝试直接使用 createImageBitmap 获取图像数据（绕过文件读取）
                    const bitmap = await createImageBitmap(file);
                    // 将 ImageBitmap 绘制到 canvas 并导出为 PNG Blob
                    const canvas = getCanvasFromPool(bitmap.width, bitmap.height);
                    const ctx = canvas.getContext('2d');
                    // 清除旧内容，避免透明图层残留
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(bitmap, 0, 0);
                    bitmap.close();
                    blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                    releaseCanvasToPool(canvas);
                    originalFormat = 'PNG'; // 强制格式为 PNG
                    console.log(`已将图片 ${file.name} 转换为 PNG 格式存储`);
                } catch (thirdError) {
                    console.error(`所有读取方式均失败：${file.name}`, thirdError);
                    throw thirdError; // 彻底失败
                }
            }
        }

        // 存储原始图片
        await storage.set(`original_${id}`, blob);
        await storage.set(`current_${id}`, blob); // 当前图片初始为原始

        // 先获取图片尺寸
        const bitmap = await createImageBitmap(blob);
        const width = bitmap.width;
        const height = bitmap.height;
        bitmap.close();

        const imageData = {
            id,
            name: file.name,
            originalName: file.name,
            status: 'original',
            size: blob.size,  // 注意：如果是回退转换，文件大小可能变化
            width: width,
            height: height,
            naturalWidth: width,
            naturalHeight: height,
            format: originalFormat,
            processed: false
        };
        images.push(imageData);
        await renderImageItem(imageData);
        updateImageCounter();
        hideEmptyState();

        if (!hasImportedFiles) {
            hasImportedFiles = true;
            const desc = document.getElementById('description-text');
            if (desc) desc.style.display = 'none';
        }
        
        // 更新界面显示
        updateImageInfo(imageData.id);
    }

            <div class="status-badge status-${imageData.status || 'original'}">${imageData.status === 'original' ? '原始图片' : imageData.status === 'encrypted' ? '已混淆' : '已解混淆'}</div>
        </div>
        <div class="image-actions">
            <button class="action-btn" data-operation="encrypt">混淆</button>

            <button class="action-btn" data-operation="restore">还原</button>

            </div>

    `;
    
        // 添加事件监听器
